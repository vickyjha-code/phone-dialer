<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>B2B Power Dialer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== Page: Leads (default) ===== -->
  <div id="leadsPage" class="page active">

    <header class="app-header leads-header">
      <div class="header-title-wrap">
        <h1 class="app-title">B2B Power Dialer</h1>
        <span class="contacts-count" id="contactsCount"></span>
      </div>
      <button class="admin-btn" id="adminBtn" aria-label="Go to Admin">⚙ Admin</button>
    </header>

    <div class="contacts-toolbar">
      <div class="select-wrapper excel-select-wrap">
        <select id="leadsExcelSelect" class="select-input">
          <option value="">— Select a contacts list —</option>
        </select>
      </div>
      <input type="search" id="searchInput" placeholder="Search name, company, number…" class="search-input" />
      <div class="filter-chips" role="group" aria-label="Filter contacts">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="with-note">📝 With Note</button>
        <button class="chip" data-filter="without-note">No Note</button>
      </div>
    </div>

    <div class="container contacts-container">
      <div id="contactsList"></div>
    </div>

  </div>

  <!-- ===== Page: Admin ===== -->
  <div id="adminPage" class="page">

    <header class="app-header admin-header">
      <button class="back-btn" id="adminBackBtn" aria-label="Back to Leads">←</button>
      <div class="header-title-wrap">
        <h1 class="app-title">Admin</h1>
      </div>
    </header>

    <main class="container">

      <!-- Upload Card -->
      <section class="card upload-card">
        <h2 class="section-title">Upload Contacts</h2>
        <label class="file-drop-zone" id="dropZone" for="fileInput">
          <span class="upload-icon">📂</span>
          <span class="upload-text">Tap to select Excel file</span>
          <span class="upload-hint">.xlsx, .xls, .csv &nbsp;·&nbsp; Max 10 MB</span>
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" hidden />
        </label>
        <div id="selectedFile" class="selected-file hidden"></div>
        <button class="btn btn-primary" id="uploadBtn" disabled>Upload</button>
        <div id="uploadStatus" class="status-msg hidden"></div>
      </section>

      <!-- Template Download -->
      <section class="card">
        <h2 class="section-title">Excel Template</h2>
        <p class="template-desc">Download the template to see the required column format before uploading your contacts.</p>
        <a href="/api/excel/template" class="btn btn-outline-primary" download>⬇ Download Template</a>
      </section>

      <!-- Uploaded Files List -->
      <section class="card">
        <h2 class="section-title">Uploaded Files</h2>
        <div id="adminFileList">
          <div class="loading-indicator"><div class="spinner"></div>Loading…</div>
        </div>
      </section>

    </main>
  </div>

  <!-- ===== Note Modal (global) ===== -->
  <div id="noteModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Add / Edit Note">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-sheet">
      <div class="modal-header">
        <h3 class="modal-title" id="modalContactName">Note</h3>
        <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      </div>
      <textarea id="noteTextarea" class="note-textarea" rows="5" placeholder="Write your call note here…" maxlength="2000"></textarea>
      <div class="note-char-count"><span id="charCount">0</span> / 2000</div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="deleteNoteBtn" hidden>Delete Note</button>
        <button class="btn btn-primary" id="saveNoteBtn">Save</button>
      </div>
      <div id="noteStatus" class="status-msg hidden"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden" role="alert" aria-live="assertive"></div>

  <script src="js/app.js"></script>
</body>
</html>
